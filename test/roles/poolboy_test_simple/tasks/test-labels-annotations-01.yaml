---
- name: Create ResourceProvider test-labels-annotations-01
  kubernetes.core.k8s:
    definition:
      apiVersion: "{{ poolboy_domain }}/v1"
      kind: ResourceProvider
      metadata:
        name: test-labels-annotations-01
        namespace: "{{ poolboy_namespace }}"
        labels: >-
          {{ {
            poolboy_domain ~ "/test": "simple"
          } }}
      spec:
        override:
          apiVersion: "{{ poolboy_domain }}/v1"
          kind: ResourceClaimTest
          metadata:
            name: "test-labels-annotations-01-{% raw %}{{ guid }}{% endraw %}"
            namespace: "{{ poolboy_test_namespace }}"
        template:
          enable: true
        validation:
          openAPIV3Schema:
            additionalProperties: false
            properties:
              spec:
                additionalProperties: false
                properties:
                  value:
                    type: string
                required:
                - value
                type: object

- name: Create ResourcePool test-labels-annotations-01
  kubernetes.core.k8s:
    definition:
      apiVersion: "{{ poolboy_domain }}/v1"
      kind: ResourcePool
      metadata:
        name: test-labels-annotations-01
        namespace: "{{ poolboy_namespace }}"
        labels: >-
          {{ {
            poolboy_domain ~ "/test": "simple"
          } }}
      spec:
        minAvailable: 1
        resourceAnnotations:
          test-annotation: test-annotation-value
        resourceLabels:
          test-label: test-label-value
        resources:
        - provider:
            apiVersion: "{{ poolboy_domain }}/v1"
            kind: ResourceProvider
            name: test-labels-annotations-01
            namespace: "{{ poolboy_namespace }}"
          template:
            spec:
              value: foo

- name: Verify ResourceHandles for test-labels-annotations-01
  kubernetes.core.k8s_info:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceHandle
    namespace: "{{ poolboy_namespace }}"
    label_selectors:
    - "{{ poolboy_domain }}/resource-pool-name = test-labels-annotations-01"
  register: r_get_resource_handles
  failed_when: >-
    r_get_resource_handles.resources | length != 1 or
    r_get_resource_handles.resources[0].spec.resourceAnnotations['test-annotation'] != 'test-annotation-value' or
    r_get_resource_handles.resources[0].spec.resourceLabels['test-label'] != 'test-label-value'
  retries: 5
  delay: 1

- name: Verify annotation and label applied to resource for ResourceHandle
  vars:
    _ref: "{{ r_get_resource_handles.resources[0].status.resources[0].reference }}"
  kubernetes.core.k8s_info:
    api_version: "{{ _ref.apiVersion }}"
    kind: "{{ _ref.kind }}"
    name: "{{ _ref.name }}"
    namespace: "{{ _ref.namespace }}"
  register: r_get_resource
  failed_when: >-
    r_get_resource.resources | length != 1 or
    r_get_resource.resources[0].metadata.annotations['test-annotation'] != 'test-annotation-value' or
    r_get_resource.resources[0].metadata.labels['test-label'] != 'test-label-value'
  retries: 5
  delay: 1

- name: Delete ResourcePool test-labels-annotations-01
  kubernetes.core.k8s:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourcePool
    name: test-labels-annotations-01
    namespace: "{{ poolboy_namespace }}"
    state: absent
