---
# Test ResourceProvider with disableCreation set
- name: Create ResourceProvider test-disable-creation-02
  kubernetes.core.k8s:
    definition:
      apiVersion: "{{ poolboy_domain }}/v1"
      kind: ResourceProvider
      metadata:
        name: test-disable-creation-02
        namespace: "{{ poolboy_namespace }}"
        labels: >-
          {{ {
            poolboy_domain ~ "/test": "simple"
          } }}
      spec:
        override:
          apiVersion: "{{ poolboy_domain }}/v1"
          kind: ResourceClaimTest
          metadata:
            name: "test-pool-02-{% raw %}{{ guid }}{% endraw %}"
            namespace: "{{ poolboy_test_namespace }}"
        template:
          enable: true
        validation:
          openAPIV3Schema:
            additionalProperties: false
            properties:
              spec:
                additionalProperties: false
                properties:
                  value:
                    type: string
                required:
                - value
                type: object
            required:
            - spec
            type: object

- name: Create ResourceClaim for test-disable-creation-02
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: "{{ poolboy_domain }}/v1"
      kind: ResourceClaim
      metadata:
        name: test-disable-creation-02
        namespace: "{{ poolboy_test_namespace }}"
        labels: >-
          {{ {
            poolboy_domain ~ "/test": "simple"
          } }}
      spec:
        disableCreation: true
        resources:
        - provider:
            apiVersion: "{{ poolboy_domain }}/v1"
            kind: ResourceProvider
            name: test-disable-creation-02
            namespace: "{{ poolboy_namespace }}"
          template:
            spec:
              value: "foo"

- name: Pause to avoid testing before poolboy could respond.
  pause:
    seconds: 1

- name: Verify ResourceClaim test-disable-creation-02 unbound
  kubernetes.core.k8s_info:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceClaim
    name: test-disable-creation-02
    namespace: "{{ poolboy_test_namespace }}"
  register: r_get_resource_claim
  vars:
    __claim: "{{ r_get_resource_claim.resources[0] | default({}) }}"
  failed_when: >-
    "provider" not in __claim.status.resources[0] | default({}) or
    "resourceHandle" in __claim.status | default({})
  until: r_get_resource_claim is success
  delay: 2
  retries: 5

- name: Create ResourceHandle for test-disable-creation-02
  kubernetes.core.k8s:
    definition:
      apiVersion: "{{ poolboy_domain }}/v1"
      kind: ResourceHandle
      metadata:
        name: guid-tdc02
        namespace: "{{ poolboy_namespace }}"
        labels: >-
          {{ {
            poolboy_domain ~ "/test": "simple"
          } }}
      spec:
        resources:
        - provider:
            apiVersion: "{{ poolboy_domain }}/v1"
            kind: ResourceProvider
            name: test-disable-creation-02
            namespace: "{{ poolboy_namespace }}"
          template:
            spec:
              value: "foo"

- name: Verify ResourceClaim test-disable-creation-02 binds
  kubernetes.core.k8s_info:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceClaim
    name: test-disable-creation-02
    namespace: "{{ poolboy_test_namespace }}"
  register: r_get_resource_claim
  vars:
    __claim: "{{ r_get_resource_claim.resources[0] | default({}) }}"
  failed_when: >-
    "resourceHandle" not in __claim.status
  until: r_get_resource_claim is success
  delay: 1
  retries: 30

- name: Delete ResourceClaim test-disable-creation-02
  kubernetes.core.k8s:
    state: absent
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceClaim
    name: test-disable-creation-02
    namespace: "{{ poolboy_test_namespace }}"
...
