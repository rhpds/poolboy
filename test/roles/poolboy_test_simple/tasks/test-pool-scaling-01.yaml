---
- name: Create ResourceProvider test-pool-scaling-01
  kubernetes.core.k8s:
    definition:
      apiVersion: "{{ poolboy_domain }}/v1"
      kind: ResourceProvider
      metadata:
        name: test-pool-scaling-01
        namespace: "{{ poolboy_namespace }}"
        labels: >-
          {{ {
            poolboy_domain ~ "/test": "simple"
          } }}
      spec:
        healthCheck: >-
          spec.value != "failed"
        override:
          apiVersion: "{{ poolboy_domain }}/v1"
          kind: ResourceClaimTest
          metadata:
            name: "test-pool-scaling-01-{% raw %}{{ guid }}{% endraw %}"
            namespace: "{{ poolboy_test_namespace }}"
        parameters:
        - name: value
          allowUpdate: true
          validation:
            openAPIV3Schema:
              type: string
        template:
          definition:
            spec:
              value: "{% raw %}{{ value }}{% endraw %}"
          enable: true
        updateFilters:
        - pathMatch: /spec/.*
          allowedOps:
          - replace

- name: Create ResourcePool test-pool-scaling-01
  kubernetes.core.k8s:
    definition:
      apiVersion: "{{ poolboy_domain }}/v1"
      kind: ResourcePool
      metadata:
        name: test-pool-scaling-01
        namespace: "{{ poolboy_namespace }}"
        labels: >-
          {{ {
            poolboy_domain ~ "/test": "simple"
          } }}
      spec:
        deleteUnhealthyResourceHandles: true
        minAvailable: 1
        provider:
          name: test-pool-scaling-01
          parameterValues:
            value: foo

- name: Verify ResourceHandles for test-pool-scaling-01
  kubernetes.core.k8s_info:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceHandle
    namespace: "{{ poolboy_namespace }}"
    label_selectors:
    - "{{ poolboy_domain }}/resource-pool-name = test-pool-scaling-01"
  register: r_get_resource_handles
  vars:
    __unbound_handles: >-
      {{ r_get_resource_handles.resources | json_query('[?spec.resourceClaim==null]') }}
  failed_when: >-
    __unbound_handles | length != 1
  retries: 5
  delay: 1

- name: Create ResourcePoolScaling test-pool-scaling-01-a
  kubernetes.core.k8s:
    definition:
      apiVersion: "{{ poolboy_domain }}/v1"
      kind: ResourcePoolScaling
      metadata:
        name: test-pool-scaling-01-a
        namespace: "{{ poolboy_namespace }}"
        labels: >-
          {{ {
            poolboy_domain ~ "/test": "simple"
          } }}
      spec:
        count: 2
        resourcePool:
          name: test-pool-scaling-01

- name: Verify ResourceHandles for test-pool-scaling-01
  kubernetes.core.k8s_info:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceHandle
    namespace: "{{ poolboy_namespace }}"
    label_selectors:
    - "{{ poolboy_domain }}/resource-pool-name = test-pool-scaling-01"
  register: r_get_resource_handles
  vars:
    __unbound_handles: >-
      {{ r_get_resource_handles.resources | json_query('[?spec.resourceClaim==null]') }}
  failed_when: >-
    __unbound_handles | length != 3
  retries: 5
  delay: 1

- name: Create ResourcePoolScaling test-pool-scaling-01-b
  kubernetes.core.k8s:
    definition:
      apiVersion: "{{ poolboy_domain }}/v1"
      kind: ResourcePoolScaling
      metadata:
        name: test-pool-scaling-01-b
        namespace: "{{ poolboy_namespace }}"
        labels: >-
          {{ {
            poolboy_domain ~ "/test": "simple"
          } }}
      spec:
        at: >-
          {{ '%FT%TZ' | strftime(now(true).strftime('%s') | int + 86400) }}
        count: 2
        resourcePool:
          name: test-pool-scaling-01

- pause:
    seconds: 5

- name: Verify ResourceHandles for test-pool-scaling-01 not increased
  kubernetes.core.k8s_info:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceHandle
    namespace: "{{ poolboy_namespace }}"
    label_selectors:
    - "{{ poolboy_domain }}/resource-pool-name = test-pool-scaling-01"
  register: r_get_resource_handles
  vars:
    __unbound_handles: >-
      {{ r_get_resource_handles.resources | json_query('[?spec.resourceClaim==null]') }}
  failed_when: >-
    __unbound_handles | length != 3

- name: Update ResourcePoolScaling test-pool-scaling-01-b
  kubernetes.core.k8s:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourcePoolScaling
    name: test-pool-scaling-01-b
    namespace: "{{ poolboy_namespace }}"
    definition:
      spec:
        at: "{{ now(true).strftime('%FT%TZ') }}"

- name: Verify ResourceHandles for test-pool-scaling-01-b
  kubernetes.core.k8s_info:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceHandle
    namespace: "{{ poolboy_namespace }}"
    label_selectors:
    - "{{ poolboy_domain }}/resource-pool-name = test-pool-scaling-01"
    - "{{ poolboy_domain }}/resource-pool-scaling-name = test-pool-scaling-01-b"
  register: r_get_resource_handles
  vars:
    __unbound_handles: >-
      {{ r_get_resource_handles.resources | json_query('[?spec.resourceClaim==null]') }}
  failed_when: >-
    __unbound_handles | length != 2
  retries: 5
  delay: 1

- name: Set test_pool_scaling_01_b_fail_handle
  ansible.builtin.set_fact:
    test_pool_scaling_01_b_fail_handle: >-
      {{ r_get_resource_handles.resources[0].metadata.name }}

- name: Mark ResourceHandle for test-pool-scaling-01-b as failed
  kubernetes.core.k8s:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceHandle
    name: "{{ test_pool_scaling_01_b_fail_handle }}"
    namespace: "{{ poolboy_namespace }}"
    definition:
      spec:
        provider:
          parameterValues:
            value: failed

- name: Verify failed ResourceHandle for test-pool-scaling-01-b deleted
  kubernetes.core.k8s_info:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceHandle
    name: "{{ test_pool_scaling_01_b_fail_handle }}"
    namespace: "{{ poolboy_namespace }}"
  register: r_get_resource_handles
  failed_when: >-
    r_get_resource_handles.resources | length != 0
  retries: 10
  delay: 1

- name: Verify failed ResourceHandle for test-pool-scaling-01-b replaced
  kubernetes.core.k8s_info:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceHandle
    namespace: "{{ poolboy_namespace }}"
    label_selectors:
    - "{{ poolboy_domain }}/resource-pool-name = test-pool-scaling-01"
    - "{{ poolboy_domain }}/resource-pool-scaling-name = test-pool-scaling-01-b"
  register: r_get_resource_handles
  vars:
    __unbound_handles: >-
      {{ r_get_resource_handles.resources | json_query('[?spec.resourceClaim==null]') }}
  failed_when: >-
    __unbound_handles | length != 2
  retries: 5
  delay: 1

- name: Delete ResourcePool test-pool-scaling-01
  kubernetes.core.k8s:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourcePool
    name: test-pool-scaling-01
    namespace: "{{ poolboy_namespace }}"
    state: absent

- name: Verify cleanup of ResourceHandles for test-pool-scaling-01 after delete
  kubernetes.core.k8s_info:
    api_version: "{{ poolboy_domain }}/v1"
    kind: ResourceHandle
    namespace: "{{ poolboy_namespace }}"
    label_selectors:
    - "{{ poolboy_domain }}/resource-pool-name = test-pool-scaling-01"
  register: r_get_resource_handles
  vars:
    __unbound_handles: >-
      {{ r_get_resource_handles.resources | json_query('[?spec.resourceClaim==null]') }}
  failed_when: >-
    __unbound_handles | length != 0
  until: r_get_resource_handles is successful
  retries: 5
  delay: 2
