{{- /* UseWorkers ConfigMap - auto-enabled when not standalone */ -}}
{{- if or .Values.worker.enabled (ne (include "poolboy.isStandalone" .) "true") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "poolboy.name" . }}-useworkers-cm
  namespace: {{ include "poolboy.namespaceName" . }}
  labels:
    {{- include "poolboy.labels" . | nindent 4 }}
    app.kubernetes.io/component: useworkers-cm
data:
  # Redis URL (base URL, components append DB number: /0, /1, /2, /3)
  REDIS_URL: {{ printf "redis://%s-redis:6379" (include "poolboy.name" .) | quote }}
  # Celery config for sending tasks from operator
  CELERY_BROKER_URL: {{ printf "redis://%s-redis:6379/0" (include "poolboy.name" .) | quote }}
  CELERY_RESULT_BACKEND: {{ printf "redis://%s-redis:6379/1" (include "poolboy.name" .) | quote }}
  # Lock retry delay (seconds) - used when resource is locked by another task
  WORKERS_LOCK_RETRY_COUNTDOWN: {{ .Values.useWorkers.lockRetryCountdown | default 3 | quote }}
  # Error retry delay (seconds) - used when task fails with an error
  WORKERS_ERROR_RETRY_COUNTDOWN: {{ .Values.useWorkers.errorRetryCountdown | default 30 | quote }}
  # Partitions for Celery queue routing (load distribution)
  {{- with .Values.useWorkers.partitions }}
  {{- if .resourcePool }}
  PARTITION_RESOURCE_POOL: {{ .resourcePool | quote }}
  {{- end }}
  {{- if .resourceHandle }}
  PARTITION_RESOURCE_HANDLE: {{ .resourceHandle | quote }}
  {{- end }}
  {{- if .resourceClaim }}
  PARTITION_RESOURCE_CLAIM: {{ .resourceClaim | quote }}
  {{- end }}
  {{- end }}
{{- end }}
