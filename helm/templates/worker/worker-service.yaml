{{- /* Worker Service - auto-enabled when operatorMode is 'distributed' */ -}}
{{- if and (or .Values.worker.enabled (eq .Values.operatorMode "distributed")) .Values.worker.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "poolboy.name" . }}-worker
  namespace: {{ include "poolboy.namespaceName" . }}
  labels:
    {{- include "poolboy.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - name: worker-metrics
      port: {{ .Values.worker.metrics.port | default 9090 }}
      protocol: TCP
      targetPort: worker-metrics
  selector:
    {{- include "poolboy.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
{{- end }}

