# Default values for ..
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

namespace:
  # Specifies whether a namespace should be created
  create: true
  # The name of the namespace to use.
  # If not set and create is true, a name is generated using the name template
  name:

# Installing CustomResourceDefinitions requires elevated privileges (typically cluster-admin)
crds:
  create: true

operatorDomain:
  # Specifies whether the operator domain should be generatedi (default: poolboy.gpte.redhat.com)
  generate: true
  # The name of the operator domain to use
  # If not set and create is true, a name is generated using the operatorDomain template
  name:

# Operator mode: 'standalone' (single operator) or 'distributed' (with Celery workers)
# Backward compatibility: 'all-in-one' maps to 'standalone', 'manager' maps to 'distributed'
operatorMode: distributed

resourceRefreshInterval: 600

anarchy:
  # Control whether anarchy integration should be created
  create: false
  domain: anarchy.gpte.redhat.com
  namespace: anarchy-operator
  service: anarchy-operator

deploy: true
replicaCount: 1

image:
  repository: quay.io/rhpds/poolboy
  pullPolicy: Always
  tagOverride: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

service:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9090
    protocol: TCP
    targetPort: 9090

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

clusterDomain: unknown

# Enable Prometheus metrics
enablePrometheusMetrics: true

# Metrics Credentials
metrics:
  username: metrics

# ===========================================
# Worker Feature Flags
# Enable/disable async processing per resource type
# ===========================================
useWorkers:
  # Retry delay (seconds) when a task cannot acquire the distributed lock.
  # Lower values = faster retry but more Redis load.
  # Higher values = slower retry but less Redis load.
  lockRetryCountdown: 3

  # Retry delay (seconds) when a task fails due to a real error (not lock contention).
  # Tasks will retry up to 5 times with this delay between attempts.
  # After 5 retries, the task fails permanently.
  errorRetryCountdown: 30

  # Partitions for Celery queue routing (load distribution across workers)
  # Higher values = more parallelism but more queues to manage
  partitions:
    resourcePool: 2
    resourceHandle: 4
    resourceClaim: 4

# ===========================================
# Redis Configuration
# ===========================================
redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 4Gi
    storageClass: ""
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "400m"

# ===========================================
# Worker Configuration
# ===========================================
worker:
  enabled: false
  replicas: 2

  # Prometheus metrics endpoint
  metrics:
    enabled: true
    port: 9090
    path: /metrics

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    scaleDownStabilizationWindowSeconds: 300

  extraEnvVars: {}
  extraEnvFrom: []

  # Command-line args for celery worker
  args:
    loglevel: info
    concurrency: 4
    pool: prefork
    maxTasksPerChild: 100

  # Celery configuration (CELERY_ prefix added automatically)
  # Keys are snake_case matching Celery config names
  config:
    result_expires: 3600
    result_extended: true
    task_ack_late: true
    task_default_retry_delay: 60
    task_default_retry_delay_max: 600
    task_reject_on_worker_lost: true
    task_soft_time_limit: 1740
    task_time_limit: 1800
    worker_prefetch_multiplier: 1
    worker_send_task_events: true
    task_send_sent_event: true

# ===========================================
# Scheduler Configuration (Celery Beat)
# ===========================================
scheduler:
  enabled: false
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  extraEnvVars: {}
  extraEnvFrom: []
  config:
    logging:
      level: INFO

# ===========================================
# Celery Flower Configuration
# ===========================================
flower:
  enabled: false
  replicas: 1

  image:
    repository: mher/flower
    tag: "2.0"
    pullPolicy: IfNotPresent

  # Web UI port
  port: 5555

  # Basic authentication
  auth:
    enabled: true
    username: admin

  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "256Mi"
      cpu: "200m"

  # Flower behavior settings
  config:
    # Maximum number of tasks to keep in memory
    maxTasks: 10000
    # Remove offline workers after N seconds (0 = keep forever)
    purgeOfflineWorkers: 0

  # Persistent storage for task history
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""

  # Additional environment variables
  extraEnvVars: {}
  extraEnvFrom: []

  # OpenShift Route for external access
  route:
    enabled: false

# ===========================================
# Task Schedules
# Supports: seconds (interval) or cron (expression)
# With ClaimWatch/HandleWatch, these are now safety nets (not primary)
# ===========================================
schedules:
  maintain-all-pools:
    enabled: false
    schedule:
      seconds: 30  # No PoolWatch yet, keep frequent
  maintain-all-handles:
    enabled: false
    schedule:
      seconds: 60  # Needs polling for lifespan.end triggers
  maintain-all-claims:
    enabled: false
    schedule:
      seconds: 60  # Same as old daemon interval
  cleanup-stale-handles:
    enabled: false
    schedule:
      cron: "0 * * * *"
